name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            archive_ext: zip
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            archive_ext: tar.gz

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        shell: pwsh
        run: go test ./...

      - name: Build release archive
        id: build
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME } else { "dev-$($env:GITHUB_SHA.Substring(0,7))" }
          $binaryName = 'service-lasso-harness'
          if ('${{ matrix.goos }}' -eq 'windows') {
            $binaryName = "$binaryName.exe"
          }

          $distDir = Join-Path $PWD 'dist'
          $stageDir = Join-Path $distDir "service-lasso-harness-${{ matrix.goos }}-${{ matrix.goarch }}"
          New-Item -ItemType Directory -Force -Path $distDir | Out-Null
          if (Test-Path $stageDir) { Remove-Item $stageDir -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null

          $env:GOOS = '${{ matrix.goos }}'
          $env:GOARCH = '${{ matrix.goarch }}'
          go build -ldflags "-X main.version=$version" -o (Join-Path $stageDir $binaryName) ./cmd/service-lasso-harness

          Copy-Item README.md $stageDir
          Copy-Item LICENSE $stageDir

          $archiveBase = "service-lasso-harness-${{ matrix.goos }}-${{ matrix.goarch }}"
          if ('${{ matrix.archive_ext }}' -eq 'zip') {
            $archivePath = Join-Path $distDir "$archiveBase.zip"
            if (Test-Path $archivePath) { Remove-Item $archivePath -Force }
            Compress-Archive -Path (Join-Path $stageDir '*') -DestinationPath $archivePath -CompressionLevel Optimal
          } else {
            $archivePath = Join-Path $distDir "$archiveBase.tar.gz"
            if (Test-Path $archivePath) { Remove-Item $archivePath -Force }
            tar -czf $archivePath -C $distDir $archiveBase
          }

          "archive_path=$archivePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "archive_name=$(Split-Path $archivePath -Leaf)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.archive_name }}
          path: ${{ steps.build.outputs.archive_path }}

      - name: Attach archive to GitHub release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.build.outputs.archive_path }}
          generate_release_notes: true
